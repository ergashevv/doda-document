  <meta charset="utf-8"/>

  <title>Bot oqimi</title>
  <style>
    :root {
      --bg: #1b1f24;
      --bg-2: #111418;
      --fg: #e8e6e3;
      --muted: #9ca3af;
      --panel: #23262b;
      --panel-2: #171a1f;
      --border: #3c4654;
      --accent: #7dd3fc;
      --accent-2: #38bdf8;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      padding: 18px 14px 28px;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--fg);
      background:
        radial-gradient(circle at top, rgba(125, 211, 252, 0.09), transparent 26%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }
    .page {
      max-width: 1240px;
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      position: sticky;
      top: 12px;
      z-index: 20;
      padding: 10px 12px;
      border: 1px solid rgba(125, 211, 252, 0.18);
      border-radius: 14px;
      background: rgba(17, 20, 24, 0.82);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.2px;
    }
    .lang-switch {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .lang-switch button {
      appearance: none;
      border: 1px solid var(--border);
      background: #20242a;
      color: var(--fg);
      border-radius: 999px;
      padding: 0.55rem 0.85rem;
      font: inherit;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }
    .lang-switch button:hover { transform: translateY(-1px); }
    .lang-switch button.active {
      border-color: var(--accent);
      background: rgba(125, 211, 252, 0.12);
      color: #fff;
    }
    .section {
      margin-top: 18px;
    }
    .section h2 {
      margin: 0 0 8px;
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.15px;
    }
    .diagram {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .diagram .mermaid {
      min-width: 1360px;
      text-align: center;
    }
    .small-gap { margin-top: 10px; }
    @media (max-width: 1080px) {
      body { padding: 14px 10px 22px; }
      .diagram .mermaid { min-width: 1160px; }
    }
    @media (max-width: 780px) {
      body { padding: 12px 8px 18px; font-size: 14px; }
      h1 { font-size: 1.08rem; }
      .diagram { padding: 10px; border-radius: 12px; }
      .diagram .mermaid { min-width: 1020px; }
    }
    @media (max-width: 560px) {
      body { padding: 10px 6px 16px; font-size: 13px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .lang-switch { justify-content: flex-start; }
      .diagram .mermaid { min-width: 860px; }
    }

    .topbar-float {
      position: fixed;
      right: 14px;
      top: 14px;
      z-index: 30;
    }

    .topbar-float .lang-switch {
      background: rgba(17, 20, 24, 0.9);
      border: 1px solid rgba(125, 211, 252, 0.16);
      border-radius: 999px;
      padding: 8px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    @media (max-width: 560px) {
      .topbar-float {
        right: 8px;
        top: 8px;
      }
      .topbar-float .lang-switch {
        padding: 6px;
      }
    }
  </style>
</head>

  function setLang(lang) {

  function esc(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function buildPage(lang) {
    const s = TEXT[lang];
    const categoryCar = s.confirm_category_car(s.cat_car);
    const categoryTruck = s.confirm_category_car(s.cat_truck);
    const categoryMoto = s.confirm_category_other(s.cat_moto);
    const categoryBike = s.confirm_category_other(s.cat_bike);
    const categoryFoot = s.confirm_category_other(s.cat_foot);
    return `
      ${section(s.pick_language, startDiagram(s))}
      ${section(s.main_menu_after_faq, faqDiagram(s))}
      ${section(s.faq_intro, serviceDiagram(s))}
      ${section(s.ask_category, dodaOverviewDiagram(s))}
      ${section(s.ask_city, cityButtonsDiagram(s))}
      ${section(categoryCar, dodaCarDiagram(s))}
      ${section(categoryTruck, dodaTruckDiagram(s))}
      ${section(categoryMoto, dodaMotoDiagram(s))}
      ${section(categoryBike + " / " + categoryFoot, dodaBikeFootDiagram(s))}
      ${section(s.yx_ask_city, yandexEntryDiagram(s))}
      ${section(s.yx_ask_citizen, yxUzTjDiagram(s))}
      ${section(s.yx_cit_kz_kg, yxKzKgDiagram(s))}
      ${section(s.yx_cit_rf + " / " + s.yx_cit_other, yxRfOtherDiagram(s))}
      ${section(s.yx_cit_tm, yxTmDiagram(s))}
      ${section(s.submit_btn, finalDiagram(s))}
      ${section(s.yx_review_hint, yxFinalDiagram(s))}
    `;
  }

  function renderLangButtons(lang) {
    const wrap = document.getElementById("langSwitch");
    wrap.innerHTML = `
      <button type="button" class="${lang === "uz" ? "active" : ""}" data-lang="uz">${esc(TEXT[lang].langBtnUz)}</button>
      <button type="button" class="${lang === "ru" ? "active" : ""}" data-lang="ru">${esc(TEXT[lang].langBtnRu)}</button>
    `;
    wrap.querySelectorAll("button").forEach((btn) => {
      btn.addEventListener("click", () => setLang(btn.dataset.lang));
    });
  }

  async function render() {
    const lang = currentLang();
    document.documentElement.lang = lang;
    document.title = TEXT[lang].pageTitle;
    document.getElementById("pageTitle").textContent = TEXT[lang].pageTitle;
    renderLangButtons(lang);
    const content = document.getElementById("content");
    content.innerHTML = buildPage(lang);
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: "loose",
      theme: "dark",
      themeVariables: {
        fontSize: window.matchMedia("(max-width: 560px)").matches ? "12px" : window.matchMedia("(max-width: 780px)").matches ? "13px" : "14px",
      },
      flowchart: {
        curve: "basis",
        padding: window.matchMedia("(max-width: 560px)").matches ? 8 : window.matchMedia("(max-width: 780px)").matches ? 9 : 10,
        nodeSpacing: window.matchMedia("(max-width: 560px)").matches ? 20 : window.matchMedia("(max-width: 780px)").matches ? 26 : 32,
        rankSpacing: window.matchMedia("(max-width: 560px)").matches ? 34 : window.matchMedia("(max-width: 780px)").matches ? 40 : 44,
      },
    });
    await mermaid.run({ nodes: Array.from(content.querySelectorAll(".mermaid")) });
  }
